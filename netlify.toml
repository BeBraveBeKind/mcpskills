[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["satori", "@resvg/resvg-js", "@netlify/blobs"]
  included_files = ["lib/fonts/**", "data/**"]

# Clean URLs for blog and legal pages
[[redirects]]
  from = "/blog/state-of-ai-skill-security"
  to = "/blog/state-of-ai-skill-security.html"
  status = 200

[[redirects]]
  from = "/blog/clawhavoc-missing-trust-layer"
  to = "/blog/clawhavoc-missing-trust-layer.html"
  status = 200

[[redirects]]
  from = "/blog/how-to-check-ai-skill-safe"
  to = "/blog/how-to-check-ai-skill-safe.html"
  status = 200

[[redirects]]
  from = "/blog/score-without-github-repo"
  to = "/blog/score-without-github-repo.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/badge/*"
  to = "/.netlify/functions/badge/:splat"
  status = 200

# Per-repo trust score landing pages (indexable, compound over time)
[[redirects]]
  from = "/score/*"
  to = "/.netlify/functions/score-page/:splat"
  status = 200

# Weekly digest content flywheel — served from weekly-digests Blob store
# /digest → latest week, /digest/:week → specific week, RSS for feed readers
[[redirects]]
  from = "/digest/rss.xml"
  to = "/.netlify/functions/digest-rss"
  status = 200
[[redirects]]
  from = "/digest/*"
  to = "/.netlify/functions/digest-page/:splat"
  status = 200
[[redirects]]
  from = "/digest"
  to = "/.netlify/functions/digest-page"
  status = 200

# Certified Safe wall — public list of all auto + manual certified repos
[[redirects]]
  from = "/certified"
  to = "/.netlify/functions/certified-wall"
  status = 200

# Lead capture when free users hit the rate limit (gift one full report)
[[redirects]]
  from = "/api/limit-capture"
  to = "/.netlify/functions/limit-capture"
  status = 200

# Trending trust movers — free tier shows top 10, Pro unlocks top 50
[[redirects]]
  from = "/api/trending"
  to = "/.netlify/functions/trending"
  status = 200
[[redirects]]
  from = "/trending"
  to = "/.netlify/functions/trending"
  status = 200

# Dynamic sitemap — includes every scored repo so Google can index the long tail
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Researcher data exports (CC BY 4.0)
[[redirects]]
  from = "/data/latest.json"
  to = "/.netlify/functions/data-export"
  status = 200
[[redirects]]
  from = "/data/latest.csv"
  to = "/.netlify/functions/data-export"
  status = 200

[[redirects]]
  from = "/roadmap"
  to = "/roadmap.html"
  status = 200

[[redirects]]
  from = "/certify"
  to = "/certify.html"
  status = 200

[[redirects]]
  from = "/api/certify"
  to = "/.netlify/functions/certify"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/unlock"
  to = "/.netlify/functions/unlock"
  status = 200

# Environment variables (set in Netlify UI, not here):
# GITHUB_TOKEN — personal access token for 5,000 req/hr
# ADMIN_KEY — protects batch-scan and admin endpoints
# LEMONSQUEEZY_WEBHOOK_SECRET — webhook signature verification (Feature 2)
# RESEND_API_KEY — email alerts (Feature 3)

# Nightly crawl: discover new repos, score, refresh stale cache, store history
[functions."nightly-crawl"]
  schedule = "0 2 * * *"

# Daily scan: re-score monitored repos, send alerts on changes
[functions."daily-scan"]
  schedule = "0 8 * * *"

# Weekly digest: analyze all scores, generate findings report
[functions."weekly-digest"]
  schedule = "0 18 * * 0"

# Monthly recap: Pro user retention touch + free lead nurture.
# Runs daily 1st–5th of each month at 14:00 UTC. Chunked + cursor'd so
# it resumes across invocations and never double-sends. Per-recipient
# `recap-sent:{yearMonth}:{id}` markers gate duplicate sends.
[functions."monthly-recap"]
  schedule = "0 14 1-5 * *"

# CORS: X-API-Key header is allowed in score.js and batch-scan.js Access-Control-Allow-Headers
